# msgautomation — painel + webhook do Evolution + rotas Livewire.
# Servido por nginx + php8.5-fpm na :9100 (porta canonica do painel/webhook em DEV).
# ISOLADO: nao altera o site desenvLaravel, o site default, nem o apache (:80).
server {
    listen 9100;
    listen [::]:9100;

    server_name _;

    root /srv/www/msgautomation/public;
    index index.php;

    charset utf-8;

    # Webhook do Evolution e o push de metricas do agente podem trazer payloads maiores.
    client_max_body_size 25m;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Livewire (/livewire/...) e todas as rotas caem no index.php via try_files acima;
    # nao precisa de bloco dedicado. Broadcast=log (sem Reverb), entao nao ha websocket.
    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.5-fpm.sock;
    }

    # Nega arquivos ocultos, exceto .well-known.
    location ~ /\.(?!well-known).* {
        deny all;
    }

    access_log /var/log/nginx/msgautomation-access.log;
    error_log  /var/log/nginx/msgautomation-error.log;
}
