# Instancia nginx DEDICADA e ISOLADA do msgautomation — serve so a :9100.
# Roda como servico systemd proprio (nginx-msgautomation.service), independente
# do nginx.service principal (que hospeda o site desenvLaravel na :80 e NAO e
# tocado por aqui). Assim o painel + webhook do Evolution sobem na :9100 sem
# depender de resolver o conflito :80 (apache) do nginx principal.
#
# Deploy: copiar para /etc/nginx/msgautomation-standalone.conf
user www-data www-data;
worker_processes auto;
pid /run/nginx-msgautomation.pid;
error_log /var/log/nginx/msgautomation-error.log warn;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;
    server_tokens off;

    access_log /var/log/nginx/msgautomation-access.log;

    # Temp paths dedicados (nao compartilha com o nginx principal).
    # Criar antes: install -d -o www-data -g www-data /var/lib/nginx-msgautomation/{body,fastcgi,proxy,uwsgi,scgi}
    client_body_temp_path /var/lib/nginx-msgautomation/body;
    fastcgi_temp_path     /var/lib/nginx-msgautomation/fastcgi;
    proxy_temp_path       /var/lib/nginx-msgautomation/proxy;
    uwsgi_temp_path       /var/lib/nginx-msgautomation/uwsgi;
    scgi_temp_path        /var/lib/nginx-msgautomation/scgi;

    server {
        listen 9100;
        listen [::]:9100;
        server_name _;

        root /srv/www/msgautomation/public;
        index index.php;
        charset utf-8;

        # Webhook do Evolution e push de metricas do agente podem trazer payloads maiores.
        client_max_body_size 25m;

        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        # Livewire (/livewire-<hash>/...) e demais rotas caem no index.php via
        # try_files acima; sem bloco dedicado. Broadcast=log (sem Reverb): sem websocket.
        location ~ \.php$ {
            fastcgi_split_path_info ^(.+?\.php)(/.*)$;
            try_files $fastcgi_script_name =404;
            set $path_info $fastcgi_path_info;
            fastcgi_param PATH_INFO $path_info;
            fastcgi_index index.php;
            include /etc/nginx/fastcgi.conf;
            fastcgi_pass unix:/run/php/php8.5-fpm.sock;
        }

        location ~ /\.(?!well-known).* {
            deny all;
        }
    }
}
